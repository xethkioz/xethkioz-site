name: XETHKIOZ Nightly Audit

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-audit:
    name: Nightly Build, Audit and Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full deploy check
        run: npm run deploy:check
